name: eventim-probe2
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/eventim-probe2.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe eventim city page + likely APIs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, ssl
          ctx = ssl.create_default_context()
          UA = {'User-Agent':'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36',
                'Accept':'text/html,application/json','Accept-Language':'bg'}
          rep=[]
          def probe(name,url):
              try:
                  req=urllib.request.Request(url,headers=UA)
                  r=urllib.request.urlopen(req,timeout=45,context=ctx)
                  b=r.read(); h=b[:600].decode('utf-8','replace')
                  # потърси следи от API вътре в HTML
                  hints=[]
                  for kw in ['api.eventim','search-api','productGroups','__NEXT_DATA__','application/json','"@type"','fanticket']:
                      if kw.encode() in b: hints.append(kw)
                  rep.append(f'OK  {name} :: {r.status}, {len(b)}b | hints: {hints}')
                  rep.append(f'    {h[:200]!r}')
              except Exception as e:
                  rep.append(f'ERR {name} :: {e}')
          city='https://www.eventim.bg/city/%D1%81%D0%BE%D1%84%D0%B8%D1%8F-7510/'
          probe('city page', city)
          probe('public exploration API', 'https://public.api.eventim.com/websearch/search-api/exploration/v2/productGroups?webId=web__eventim-bg&language=bg&sort=DateAsc&top=30&city_ids=7510')
          probe('public search API', 'https://public.api.eventim.com/websearch/search-api/v1/products?webId=web__eventim-bg&language=bg&sort=DateAsc&top=30&city_ids=7510')
          open('eventim-probe2.txt','w',encoding='utf-8').write('\n'.join(rep)+'\n')
          print('\n'.join(rep))
          PYEOF
      - name: Commit
        run: |
          git config user.name probe; git config user.email probe@bak
          git add eventim-probe2.txt
          git commit -m "eventim probe2" && git push
