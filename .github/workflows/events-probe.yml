name: events-probe
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/events-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe concert data sources
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json

          UA = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36',
                'Accept': 'application/json, text/html'}
          rep = []

          def probe(name, url, want_json=False):
              try:
                  req = urllib.request.Request(url, headers=UA)
                  r = urllib.request.urlopen(req, timeout=40)
                  body = r.read()
                  head = body[:400].decode('utf-8', errors='replace')
                  extra = ''
                  if want_json:
                      try:
                          d = json.loads(body)
                          keys = list(d.keys())[:8] if isinstance(d, dict) else f'list[{len(d)}]'
                          extra = f' | JSON OK, keys: {keys}'
                          if isinstance(d, dict) and 'products' in d:
                              extra += f" | products: {len(d['products'])}"
                      except Exception as e:
                          extra = f' | not JSON: {e}'
                  rep.append(f'OK  {name} :: HTTP {r.status}, {len(body)}b{extra}')
                  rep.append(f'    sample: {head[:250]!r}')
              except Exception as e:
                  rep.append(f'ERR {name} :: {e}')

          probe('Eventim exploration API',
                'https://public.api.eventim.com/websearch/search-api/exploration/v2/productGroups?webId=web__eventim-bg&language=bg&city_names=%D0%A1%D0%BE%D1%84%D0%B8%D1%8F&page=1&sort=DateAsc&top=20',
                want_json=True)
          probe('Eventim.bg city page HTML',
                'https://www.eventim.bg/bg/grad/sofiya-1/venues.html')
          probe('НДК програма',
                'https://www.ndk.bg/програма')
          probe('НДК (латиница)',
                'https://www.ndk.bg/program')
          probe('Арена София',
                'https://www.arenasofia.bg/events/')
          probe('Bilet.bg',
                'https://bilet.bg/bg/muzika')

          open('events-probe-report.txt', 'w', encoding='utf-8').write('\n'.join(rep) + '\n')
          print('\n'.join(rep))
          PYEOF

      - name: Commit
        run: |
          git config user.name probe-bot; git config user.email probe-bot@bak
          git add events-probe-report.txt
          git commit -m "events source probe report" && git push
