name: events-probe
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/events-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe Eventim + concert sources (fixed)
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          UA = {'User-Agent': 'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36',
                'Accept': 'application/json, text/html', 'Accept-Language': 'bg,en'}
          rep = []
          def probe(name, url, js=False):
              try:
                  req = urllib.request.Request(url, headers=UA)
                  r = urllib.request.urlopen(req, timeout=45, context=ctx)
                  body = r.read()
                  extra = ''
                  if js:
                      try:
                          d = json.loads(body)
                          if isinstance(d, dict):
                              extra = ' | JSON keys: ' + str(list(d.keys())[:10])
                          else:
                              extra = f' | JSON list[{len(d)}]'
                      except Exception as e:
                          extra = ' | not JSON: ' + str(e)[:60]
                  rep.append(f'OK  {name} :: HTTP {r.status}, {len(body)}b{extra}')
                  rep.append('    ' + repr(body[:220].decode("utf-8", "replace")))
              except Exception as e:
                  rep.append(f'ERR {name} :: {str(e)[:120]}')

          city = urllib.parse.quote('софия')
          # Публичният exploration API на Eventim (истинският, който сайтът ползва)
          probe('Eventim exploration v2',
                'https://public.api.eventim.com/websearch/search-api/exploration/v2/productGroups'
                '?webId=web__eventim-bg&language=bg&sort=DateAsc&in_stock=true&top=30&page=1',
                js=True)
          probe('Eventim search v1',
                'https://public.api.eventim.com/websearch/search-api/v1/products'
                '?webId=web__eventim-bg&language=bg&sort=DateAsc&retable=true&top=30',
                js=True)
          probe('Eventim city HTML',
                'https://www.eventim.bg/city/' + city + '-7510/')
          probe('NDK program (encoded)',
                'https://www.ndk.bg/' + urllib.parse.quote('програма'))
          probe('bilet.bg music',
                'https://bilet.bg/bg/kategorii/musica')
          probe('grabo/eventim sitemap',
                'https://www.eventim.bg/sitemap.xml')

          open('events-probe-report.txt', 'w', encoding='utf-8').write('\n'.join(rep) + '\n')
          print('\n'.join(rep))
          PYEOF

      - name: Commit
        run: |
          git config user.name probe-bot; git config user.email probe-bot@bak
          git add events-probe-report.txt
          git commit -m "events probe v2 (fixed URLs, mobile UA, ssl bypass)" && git push
