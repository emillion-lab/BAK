name: events-eventim
on:
  schedule:
    - cron: '30 4 * * *'   # 07:30 София
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/events-eventim.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Eventim Sofia (concerts/shows) from server-rendered HTML + JSON-LD
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, re, datetime, ssl, html as H
          ctx = ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE
          UA = {'User-Agent':'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36','Accept-Language':'bg'}
          url = 'https://www.eventim.bg/city/' + urllib.parse.quote('софия') + '-7510/'
          html = urllib.request.urlopen(urllib.request.Request(url, headers=UA), timeout=60, context=ctx).read().decode('utf-8','replace')

          events = []
          # 1) Опит: JSON-LD структурирани събития (най-чисто, ако ги има)
          for m in re.finditer(r'<script[^>]+application/ld\+json[^>]*>(.*?)</script>', html, re.S):
              try:
                  d = json.loads(m.group(1).strip())
              except Exception:
                  continue
              items = d if isinstance(d, list) else [d]
              for it in items:
                  if not isinstance(it, dict): continue
                  if it.get('@type') in ('Event','MusicEvent','TheaterEvent','Festival') or 'startDate' in it:
                      loc = it.get('location') or {}
                      if isinstance(loc, list): loc = loc[0] if loc else {}
                      addr = (loc.get('address') if isinstance(loc, dict) else None) or {}
                      events.append({
                          't': H.unescape(str(it.get('name','?')))[:70],
                          'start': it.get('startDate'),
                          'venue': (loc.get('name') if isinstance(loc, dict) else None) or '',
                          'city': (addr.get('addressLocality') if isinstance(addr, dict) else '') or '',
                          'url': it.get('url') or '',
                      })

          # 2) Fallback: Next.js/hydration JSON (__NEXT_DATA__ или подобно)
          if not events:
              m = re.search(r'__NEXT_DATA__[^>]*>(.*?)</script>', html, re.S)
              nd_found = bool(m)
          else:
              nd_found = None

          # само софийски, само с дата, дедуп
          seen, out = set(), []
          for e in events:
              sd = e.get('start') or ''
              if not sd: continue
              key = (e['t'], sd)
              if key in seen: continue
              seen.add(key)
              out.append(e)

          today = datetime.date.today()
          res = {'source':'eventim.bg','date':str(today),'updated':datetime.datetime.now().isoformat(),
                 'count':len(out),'events':out}
          json.dump(res, open('eventim.json','w',encoding='utf-8'), ensure_ascii=False, indent=1)

          rep = [f'Eventim София: {len(out)} събития с дата (от {len(events)} намерени JSON-LD)']
          for e in out[:25]:
              rep.append(f"  {e['start']}  {e['t']}  @ {e['venue']} {e['city']}")
          if not events:
              rep.append('НЯМА JSON-LD. __NEXT_DATA__ намерен: ' + str(nd_found))
              # покажи какви script блокове има, за да знам къде са данните
              tags = re.findall(r'<script[^>]*id="([^"]+)"', html)[:15]
              rep.append('script id-та: ' + str(tags))
              m2 = re.findall(r'"(?:productName|headline|name)":"([^"]{5,60})"', html)[:10]
              rep.append('names в HTML: ' + str(m2))
          open('eventim-report.txt','w',encoding='utf-8').write('\n'.join(rep)+'\n')
          print('\n'.join(rep))
          PYEOF

      - name: Commit
        run: |
          git config user.name eventim-bot; git config user.email eventim-bot@bak
          git add eventim.json eventim-report.txt
          git diff --cached --quiet || (git commit -m "eventim: Sofia concerts scrape" && git push)
