name: events-eventim
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/events-eventim.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Eventim Sofia
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, re, datetime, ssl, html as H, traceback
          rep = []
          try:
              ctx = ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE
              UA = {'User-Agent':'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36','Accept-Language':'bg'}
              url = 'https://www.eventim.bg/city/' + urllib.parse.quote('софия') + '-7510/'
              html = urllib.request.urlopen(urllib.request.Request(url, headers=UA), timeout=60, context=ctx).read().decode('utf-8','replace')
              rep.append('HTML: %d байта' % len(html))

              events = []
              ld = re.findall(r'<script[^>]+application/ld\+json[^>]*>(.*?)</script>', html, re.S)
              rep.append('JSON-LD блокове: %d' % len(ld))
              for blk in ld:
                  try: d = json.loads(blk.strip())
                  except Exception: continue
                  items = d if isinstance(d, list) else [d]
                  for it in items:
                      if isinstance(it, dict) and ('startDate' in it or it.get('@type','').endswith('Event')):
                          loc = it.get('location') or {}
                          if isinstance(loc, list): loc = loc[0] if loc else {}
                          events.append({
                              't': H.unescape(str(it.get('name','?')))[:70],
                              'start': it.get('startDate'),
                              'venue': (loc.get('name') if isinstance(loc, dict) else '') or '',
                              'url': it.get('url') or '',
                          })

              # Fallback: имена + дати от вградения JSON на страницата
              if not events:
                  names = re.findall(r'"(?:productName|headline|name|title)":"([^"\\]{5,70})"', html)
                  dates = re.findall(r'"(?:startDate|date|eventDate)":"(20\d\d-\d\d-\d\dT?[\d:]*)"', html)
                  rep.append('fallback: %d имена, %d дати' % (len(names), len(dates)))
                  rep.append('първи имена: ' + str(names[:8]))
                  rep.append('script id-та: ' + str(re.findall(r'<script[^>]*id="([^"]+)"', html)[:12]))

              seen, out = set(), []
              for e in events:
                  if not e.get('start'): continue
                  k = (e['t'], e['start'])
                  if k in seen: continue
                  seen.add(k); out.append(e)

              today = datetime.date.today()
              json.dump({'source':'eventim.bg','date':str(today),'count':len(out),'events':out},
                        open('eventim.json','w',encoding='utf-8'), ensure_ascii=False, indent=1)
              rep.append('ЗАПИСАНИ събития: %d' % len(out))
              for e in out[:20]:
                  rep.append('  %s  %s @ %s' % (e['start'], e['t'], e['venue']))
          except Exception as ex:
              rep.append('EXCEPTION: ' + repr(ex))
              rep.append(traceback.format_exc()[:800])
          open('eventim-report.txt','w',encoding='utf-8').write('\n'.join(rep)+'\n')
          print('\n'.join(rep))
          PYEOF

      - name: Commit
        run: |
          git config user.name eventim-bot; git config user.email eventim-bot@bak
          git add -A
          git commit -m "eventim scrape + report" || echo "nothing to commit"
          git push || echo "nothing to push"
