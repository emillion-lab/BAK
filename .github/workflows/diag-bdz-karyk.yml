name: diag-bdz-karyk
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diag-bdz-karyk.yml'

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: KARYK logic (local, always works)
        continue-on-error: true
        run: |
          mkdir -p debug
          python3 - <<'PYEOF'
          import re
          src = open('app.js', encoding='utf-8').read()
          out, seen = [], []
          for kw in ['karykMode', 'karyk', 'borovo', 'Борово']:
              for mm in re.finditer(re.escape(kw), src):
                  ln = src.count('\n', 0, mm.start()) + 1
                  if any(abs(ln - s) < 30 for s in seen):
                      continue
                  seen.append(ln)
                  out.append("--- %s L%d ---\n%s" % (kw, ln, src[max(0, mm.start()-800):mm.start()+1000]))
                  if len(out) >= 7:
                      break
              if len(out) >= 7:
                  break
          open('debug/karyk.txt', 'w', encoding='utf-8').write("\n\n".join(out)[:18000] + "\n")
          print("karyk секции:", len(out))
          PYEOF

      - name: BDZ dump (network, may fail)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          mkdir -p debug
          python3 - <<'PYEOF'
          import re, ssl
          from urllib.request import Request, urlopen
          from urllib.parse import quote

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36",
                "Accept-Language": "bg-BG,bg;q=0.9"}
          INSECURE = ssl._create_unverified_context()
          rep = []

          def fetch(u, timeout=12):
              last = "no attempt"
              for tgt, ctx in ((u, None), (u, INSECURE)):
                  try:
                      with urlopen(Request(tgt, headers=UA), timeout=timeout, context=ctx) as r:
                          b = r.read()
                      head = b[:3000].decode("ascii", "ignore").lower()
                      if "1251" in head:
                          return b.decode("cp1251", "ignore"), "ok-1251"
                      try:
                          return b.decode("utf-8"), "ok"
                      except UnicodeDecodeError:
                          return b.decode("cp1251", "ignore"), "ok-fb"
                  except Exception as e:
                      last = repr(e)[:120]
              return None, last

          PAGES = {
              "bdz_home": "https://razpisanie.bdz.bg/",
              "bdz_bg": "https://www.bdz.bg/bg",
          }
          for name, url in PAGES.items():
              try:
                  body, st = fetch(url)
              except Exception as e:
                  rep.append("%s: CRASH %r" % (name, e)); continue
              if body is None:
                  rep.append("%s: FAIL %s | %s" % (name, st, url)); continue
              slim = re.sub(r"<script\b.*?</script>", "<!--s-->", body, flags=re.S | re.I)
              slim = re.sub(r"<style\b.*?</style>", "<!--c-->", slim, flags=re.S | re.I)
              open("debug/%s.html" % name, "w", encoding="utf-8").write(slim[:60000])
              forms = re.findall(r'<form[^>]*>', slim)[:3]
              fields = re.findall(r'name="([^"]{2,30})"', slim)[:25]
              links = [l for l in re.findall(r'href="([^"]{3,90})"', slim) if re.search(r'stanci|station|razpis|arriv|pristig', l, re.I)][:10]
              rep.append("%s: %s raw=%db | forms=%s | fields=%s | links=%s" % (name, st, len(body), forms, fields, links))

          open("debug/bdz-report.txt", "w", encoding="utf-8").write("\n".join(rep) + "\n")
          print("\n".join(rep))
          PYEOF

      - name: Commit whatever we got
        if: always()
        run: |
          git config user.name diag-bot; git config user.email diag@bak
          git add -A debug/ || true
          git diff --cached --quiet || (git commit -m "diag: KARYK + BDZ (каквото е успяло)" && git push)
