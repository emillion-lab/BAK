name: patch-events-ui
on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_events_ui.py'
      - '.github/workflows/patch-events-ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply events UI patch
        run: python3 patch_events_ui.py
      - name: Commit
        run: |
          git config user.name ui-bot; git config user.email ui-bot@bak
          git add app.js index.html events-ui-report.txt
          git diff --cached --quiet || (git commit -m "events UI: theatre markers + tonight chip" && git push)
