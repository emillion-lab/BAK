name: events
on:
  schedule:
    - cron: '0 4 * * *'   # всяка сутрин 07:00 София
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/events.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape today's Sofia theatre program
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re, json, datetime, html as H
          today = datetime.date.today()
          url = f'https://theatre.art.bg/calendar.php?date={today}&city=20'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          raw = urllib.request.urlopen(req, timeout=40).read()
          page = H.unescape(raw.decode('windows-1251', errors='replace'))

          VENUES = {
            'НАРОДЕН ТЕАТЪР': (42.6946, 23.3247),
            'ИВАН ВАЗОВ': (42.6946, 23.3247),
            'САТИРИЧЕН': (42.6975, 23.3289),
            'ТЕАТЪР 199': (42.6902, 23.3252),
            'СЪЛЗА И СМЯХ': (42.6939, 23.3260),
            'БЪЛГАРСКА АРМИЯ': (42.6989, 23.3247),
            'ЗАД КАНАЛА': (42.6923, 23.3457),
            'ВЪЗРАЖДАНЕ': (42.7005, 23.3120),
            'МЛАДЕЖКИ': (42.6975, 23.3345),
            'ТЕАТЪР СОФИЯ': (42.6935, 23.3420),
            'НДК': (42.6852, 23.3190),
            'СИТИ МАРК': (42.6938, 23.3452),
            'CITY MARK': (42.6938, 23.3452),
            'THEATRO': (42.6913, 23.3229),
            'ОТКРИТА СЦЕНА': (42.6939, 23.3260),
          }
          DUR = 110   # типична пиеса ~1:50
          EARLY = 12  # цел за пристигане: 12 мин преди края

          text = re.sub(r'<[^>]+>', '|', page)
          text = re.sub(r'\|+', '|', text)
          up = text.upper()
          events, seen = [], set()
          for m in re.finditer(r'(\d{1,2})[.:](\d{2})\s*час', text, re.I):
              h, mi = int(m.group(1)), int(m.group(2))
              lo, hi = max(0, m.start()-300), m.end()+300
              ctx_up = up[lo:hi]
              venue, coords = None, None
              for k, c in VENUES.items():
                  if k in ctx_up:
                      venue, coords = k.title(), c
                      break
              if not venue:
                  continue
              before = text[lo:m.start()]
              parts = [p.strip() for p in before.split('|') if 3 < len(p.strip()) < 80 and 'час' not in p]
              parts = [p for p in parts if not re.match(r'^[\d\s.:]+$', p)]
              title = parts[-1].strip() if parts else '?'
              key = (title.upper(), h, mi)
              if key in seen:
                  continue
              seen.add(key)
              start = h*60+mi
              end = start + DUR
              tgt = end - EARLY
              fmt = lambda x: f'{(x//60)%24:02d}:{x%60:02d}'
              events.append({
                  't': title[:60].title() if title.isupper() else title[:60],
                  'v': venue,
                  'lat': coords[0], 'lng': coords[1],
                  'start': fmt(start), 'end': fmt(end), 'target': fmt(tgt),
              })

          out = {'date': str(today), 'updated': datetime.datetime.now().isoformat(),
                 'count': len(events), 'events': events}
          json.dump(out, open('events.json', 'w', encoding='utf-8'), ensure_ascii=False, indent=1)

          rep = [f'{today}: {len(events)} събития']
          for e in events:
              rep.append(f"  {e['start']} {e['t']} @ {e['v']} → край ~{e['end']}, цел {e['target']}")
          if not events:
              i = text.find('час')
              rep.append('RAW SAMPLE: ' + repr(text[max(0,i-300):i+120])[:500])
          open('events-report.txt', 'w', encoding='utf-8').write('\n'.join(rep) + '\n')
          print('\n'.join(rep))
          PYEOF

      - name: Commit
        run: |
          git config user.name events-bot; git config user.email events-bot@bak
          git add events.json events-report.txt
          git diff --cached --quiet || (git commit -m "events: daily theatre program" && git push)
