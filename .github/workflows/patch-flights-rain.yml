name: patch-flights-rain
on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_flights_rain.py'
      - '.github/workflows/patch-flights-rain.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply flights+rain patch
        run: python3 patch_flights_rain.py
      - name: Commit
        run: |
          git config user.name ui-bot; git config user.email ui-bot@bak
          git add app.js index.html flights-rain-report.txt
          git diff --cached --quiet || (git commit -m "☔ дъжд прогноза + 🛬 излизат-сега панел" && git push)
