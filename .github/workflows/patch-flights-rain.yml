name: patch-flights-rain
on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_flights_rain.py'
      - '.github/workflows/patch-flights-rain.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python3 patch_flights_rain.py
      - name: Commit
        run: |
          git config user.name ui-bot; git config user.email ui-bot@bak
          git add app.js index.html flights-rain-report.txt debug/ 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "patch + debug артефакти" && git push)
