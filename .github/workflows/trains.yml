name: BDZ Train Arrivals
on:
  schedule:
    - cron: '10,40 3-21 * * *'   # на 30 мин, 06:10–00:40 софийско
  workflow_dispatch:
  push:
    paths:
      - 'scripts/scrape_trains.py'
      - '.github/workflows/trains.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scrape BDZ live arrivals
        continue-on-error: true
        run: python scripts/scrape_trains.py
      - name: Commit if changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add train-arrivals.json debug/ 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "auto: БДЖ пристигащи $(date -u +%H:%M)" && git push)
