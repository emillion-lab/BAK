name: eventim-extract
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/eventim-extract.yml'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract structured events from eventim city page
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re, json, ssl
          ctx=ssl.create_default_context()
          UA={'User-Agent':'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36','Accept-Language':'bg'}
          url='https://www.eventim.bg/city/%D1%81%D0%BE%D1%84%D0%B8%D1%8F-7510/'
          rep=[]
          try:
              req=urllib.request.Request(url,headers=UA)
              html=urllib.request.urlopen(req,timeout=60,context=ctx).read().decode('utf-8','replace')
              rep.append(f'HTML: {len(html)} chars')
          except Exception as e:
              html=''
              rep.append('FETCH ERR: '+repr(e))

          events=[]
          if html:
              ld=re.findall(r'<script[^>]+application/ld\+json[^>]*>(.*?)</script>',html,re.S)
              rep.append(f'JSON-LD блокове: {len(ld)}')
              for blob in ld:
                  try: d=json.loads(blob.strip())
                  except Exception as e:
                      rep.append('  LD parse err: '+str(e)[:80]); continue
                  items=d if isinstance(d,list) else [d]
                  for it in items:
                      if isinstance(it,dict) and 'Event' in str(it.get('@type','')):
                          loc=it.get('location') or {}
                          events.append({'name':it.get('name'),'start':it.get('startDate'),
                            'venue':loc.get('name') if isinstance(loc,dict) else None,'url':it.get('url')})
              rep.append(f'JSON-LD Event-и: {len(events)}')
              for e in events[:10]: rep.append('  '+json.dumps(e,ensure_ascii=False)[:170])

              # NEXT_DATA
              nd=re.search(r'__NEXT_DATA__[^>]*>(.*?)</script>',html,re.S)
              rep.append('NEXT_DATA: '+('да, '+str(len(nd.group(1)))+' chars' if nd else 'не'))
              hosts=sorted(set(re.findall(r'https://([a-z0-9.\-]*eventim[a-z0-9.\-]*)',html)))
              rep.append('eventim hostове: '+str(hosts[:15]))

          json.dump({'events':events},open('eventim-raw.json','w',encoding='utf-8'),ensure_ascii=False,indent=1)
          open('eventim-extract.txt','w',encoding='utf-8').write('\n'.join(rep)+'\n')
          print('\n'.join(rep))
          PYEOF
      - name: Commit
        run: |
          git config user.name ex; git config user.email ex@bak
          git add -A
          git commit -m "eventim extract probe" || true
          git push
