name: eventim-extract
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/eventim-extract.yml'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract structured events from eventim city page
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re, json, ssl
          ctx=ssl.create_default_context()
          UA={'User-Agent':'Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36','Accept-Language':'bg'}
          url='https://www.eventim.bg/city/%D1%81%D0%BE%D1%84%D0%B8%D1%8F-7510/'
          req=urllib.request.Request(url,headers=UA)
          html=urllib.request.urlopen(req,timeout=60,context=ctx).read().decode('utf-8','replace')
          rep=[]

          # 1) schema.org JSON-LD блокове
          ld=re.findall(r'<script[^>]+application/ld\+json[^>]*>(.*?)</script>',html,re.S)
          rep.append(f'JSON-LD блокове: {len(ld)}')
          events=[]
          for blob in ld:
              try:
                  d=json.loads(blob)
              except: continue
              items=d if isinstance(d,list) else [d]
              for it in items:
                  if isinstance(it,dict) and 'Event' in str(it.get('@type','')):
                      events.append({
                        'name':it.get('name'),
                        'start':it.get('startDate'),
                        'venue':(it.get('location') or {}).get('name') if isinstance(it.get('location'),dict) else None,
                        'url':it.get('url'),
                      })
          rep.append(f'JSON-LD Event-и: {len(events)}')
          for e in events[:8]: rep.append('  LD: '+json.dumps(e,ensure_ascii=False)[:160])

          # 2) __NEXT_DATA__ / вграден API hostname
          hosts=set(re.findall(r'https://([a-z0-9.\-]*eventim[a-z0-9.\-]*)/[a-z]',html))
          rep.append('eventim hostове в HTML: '+str(sorted(hosts)[:12]))
          api=re.findall(r'(https://[a-z0-9.\-]*eventim[a-z0-9.\-]*/[^"\'\\ ]*(?:search|product|exploration)[^"\'\\ ]*)',html)
          rep.append('API-подобни URL: '+str(list(dict.fromkeys(api))[:6]))

          if events:
              json.dump({'events':events},open('eventim-raw.json','w',encoding='utf-8'),ensure_ascii=False,indent=1)
          open('eventim-extract.txt','w',encoding='utf-8').write('\n'.join(rep)+'\n')
          print('\n'.join(rep))
          PYEOF
      - name: Commit
        run: |
          git config user.name ex; git config user.email ex@bak
          git add eventim-extract.txt eventim-raw.json 2>/dev/null || git add eventim-extract.txt
          git commit -m "eventim extract probe" && git push
