name: patch-flights-ui
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/patch-flights-ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply flight UI patches
        run: |
          python3 - <<'PYEOF'
          src = open('app.js', encoding='utf-8').read()
          changes = 0

          # 1) Exit window 5-15 / 10-30 (ако още не е сменено)
          old_win = ("        const exitFirst = nonSchengen ? 15 : 10;\n"
                     "        const exitLast  = nonSchengen ? 30 : 20;")
          new_win = ("        const exitFirst = nonSchengen ? 10 : 5;\n"
                     "        const exitLast  = nonSchengen ? 30 : 15;")
          if src.count(old_win) == 1:
              src = src.replace(old_win, new_win); changes += 1

          # 2) Grace период — "now" остава още 15 мин след края на прозореца
          old_state = ("    f._state = (nowTs >= f.exitFromTs && nowTs <= f.exitToTs) ? 'now'\n"
                       "             : (f.exitToTs < nowTs) ? 'done' : 'future';")
          new_state = ("    const graceTs = f.exitToTs + 15*60000; // \u0433\u0440\u0435\u0439\u0441: \u0432\u0441\u0435 \u043e\u0449\u0435 \u043c\u043e\u0436\u0435 \u0434\u0430 \u0438\u0437\u043b\u0438\u0437\u0430\u0442\n"
                       "    f._state = (nowTs >= f.exitFromTs && nowTs <= graceTs) ? 'now'\n"
                       "             : (f.exitToTs < nowTs) ? 'done' : 'future';")
          assert src.count(old_state) == 1, 'state marker %d' % src.count(old_state)
          src = src.replace(old_state, new_state); changes += 1

          # 3) По-едър шрифт
          reps = [
            ('font-weight:800;font-size:13px;min-width:44px;color:var(--text)">${f.fn}',
             'font-weight:800;font-size:16px;min-width:48px;color:var(--text)">${f.fn}'),
            ("font-size:10px;font-weight:900;color:var(--cyan);border:1px solid var(--border);border-radius:5px;padding:1px 4px\">${'\u0422'+f.term}",
             "font-size:12px;font-weight:900;color:var(--cyan);border:1px solid var(--border);border-radius:5px;padding:1px 5px\">${'\u0422'+f.term}"),
            ('flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(f.depAirport',
             'flex:1;font-size:14px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(f.depAirport'),
            ('font-size:10px;font-weight:900;color:#ef4444;white-space:nowrap">\u0418\u0417\u041b\u0418\u0417\u0410\u0422',
             'font-size:12px;font-weight:900;color:#ef4444;white-space:nowrap">\u0418\u0417\u041b\u0418\u0417\u0410\u0422'),
            ('font-weight:800;font-size:13px;color:${col};white-space:nowrap">${fmt(f.exitFromH',
             'font-weight:800;font-size:15px;color:${col};white-space:nowrap">${fmt(f.exitFromH'),
          ]
          for a, b in reps:
              assert src.count(a) == 1, 'font marker missing: %s' % a[:40]
              src = src.replace(a, b); changes += 1

          # 4) Легенда съответства на новите прозорци
          leg_pairs = [
            ('\ud83c\uddea\ud83c\uddfa \u0428\u0435\u043d\u0433\u0435\u043d: \u0438\u0437\u043b\u0438\u0437\u0430\u043d\u0435 +10\u201320 \u043c\u0438\u043d', '\ud83c\uddea\ud83c\uddfa \u0428\u0435\u043d\u0433\u0435\u043d: +5\u201315 \u043c\u0438\u043d'),
            ('\ud83d\udec2 \u0418\u0437\u0432\u044a\u043d \u0428\u0435\u043d\u0433\u0435\u043d: +15\u201330 \u043c\u0438\u043d', '\ud83d\udec2 \u0418\u0437\u0432\u044a\u043d \u0428\u0435\u043d\u0433\u0435\u043d: +10\u201330 \u043c\u0438\u043d'),
          ]
          for a, b in leg_pairs:
              if src.count(a) == 1:
                  src = src.replace(a, b); changes += 1

          open('app.js', 'w', encoding='utf-8').write(src)
          print('changes applied:', changes)

          import re
          idx = open('index.html', encoding='utf-8').read()
          idx2 = re.sub(r'app\.js\?v=[0-9a-z]+', 'app.js?v=20260720ui', idx)
          assert idx2 != idx
          open('index.html', 'w', encoding='utf-8').write(idx2)
          print('cache-buster bumped')
          PYEOF

      - name: Commit
        run: |
          git config user.name "ui-bot"
          git config user.email "ui-bot@users.noreply.github.com"
          git add app.js index.html
          git diff --cached --quiet || (git commit -m "flights UI: exit 5-15/10-30, 15min red grace period, larger fonts, legend" && git push)
