name: fix-legend
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-legend.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix legend text (anchor-based, tolerant of dashes/nbsp)
        run: |
          python3 - <<'PYEOF'
          import re
          src = open('app.js', encoding='utf-8').read()
          # Намираме целия div на легендата по котвата "= излизат сега"
          # и заменяме само вътрешния текст между >...</div>
          anchor = '\u0438\u0437\u043b\u0438\u0437\u0430\u0442 \u0441\u0435\u0433\u0430</div>'
          end = src.find(anchor)
          assert end != -1, 'anchor not found'
          # намери началото на текста (последният '>' преди знамето на Шенген)
          flag = '\U0001F1EA\U0001F1FA \u0428\u0435\u043d\u0433\u0435\u043d'
          start = src.rfind(flag, 0, end)
          assert start != -1, 'flag not found'
          new_inner = ("\U0001F1EA\U0001F1FA \u0428\u0435\u043d\u0433\u0435\u043d: +5\u201315 \u043c\u0438\u043d &nbsp;|&nbsp; "
                       "\U0001F6C2 \u0418\u0437\u0432\u044a\u043d \u0428\u0435\u043d\u0433\u0435\u043d: +10\u201330 \u043c\u0438\u043d &nbsp;|&nbsp; "
                       "\U0001F534 = \u0438\u0437\u043b\u0438\u0437\u0430\u0442 \u0441\u0435\u0433\u0430</div>")
          src = src[:start] + new_inner + src[end + len(anchor):]
          open('app.js', 'w', encoding='utf-8').write(src)
          print('legend replaced by anchor')
          idx = open('index.html', encoding='utf-8').read()
          idx = re.sub(r'app\.js\?v=[0-9a-z]+', 'app.js?v=20260720ui2', idx)
          open('index.html', 'w', encoding='utf-8').write(idx)
          PYEOF
      - name: Commit
        run: |
          git config user.name "ui-bot"; git config user.email "ui-bot@users.noreply.github.com"
          git add app.js index.html
          git diff --cached --quiet || (git commit -m "flights: legend text corrected to 5-15/10-30 (anchor replace)" && git push)
