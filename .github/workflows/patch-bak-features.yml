name: patch-bak-features
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/patch-bak-features.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply feature patches with report
        run: |
          python3 patch_features.py || true
        continue-on-error: true

      - name: Write patcher
        run: echo "placeholder"

      - name: Commit
        run: |
          git config user.name "feat-bot"; git config user.email "feat-bot@bak"
          git add -A
          git diff --cached --quiet || (git commit -m "BAK features + report" && git push)
