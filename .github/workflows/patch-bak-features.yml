name: patch-bak-features
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/patch-bak-features.yml'
      - 'patch_features.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply feature patches (self-reporting)
        run: python3 patch_features.py

      - name: Commit
        run: |
          git config user.name "feat-bot"; git config user.email "feat-bot@bak"
          git add app.js index.html patch-report.txt
          git diff --cached --quiet || (git commit -m "BAK features: counter, dedupe, pools, rain (+report)" && git push)
