name: CAS Arrivals Scraper

on:
  schedule:
    - cron: '5,35 4-20 * * *'   # на всеки 30 мин, 07:05–23:35 софийско
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scrape arrivals
        run: python scripts/scrape_arrivals.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bus-arrivals.json
          git diff --cached --quiet || (git commit -m "auto: ЦАС пристигащи $(date -u +%H:%M)" && git push)
